name: evim_furniture
description: "Evim Furniture — browse furniture collections, explore materials, and try pieces in your room with AR."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  video_player: ^2.11.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  dio: ^5.9.2
  get_it: ^9.2.1
  easy_localization: ^3.0.8
  flutter_secure_storage: ^10.0.0
  carousel_slider: ^5.1.2
  chewie: ^1.13.0
  model_viewer_plus: ^1.10.0
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  gal: ^1.1.2
  path_provider: ^2.1.5
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
